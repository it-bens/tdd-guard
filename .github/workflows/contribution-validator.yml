# SECURITY CONSIDERATIONS:
# - Uses 'pull_request' trigger (safe) - NEVER use 'pull_request_target'
# - No repository secrets exposed to PR authors
# - Read-only permissions for repository access
# - No write access except comments
# - API quota protection via size/frequency limits
# - Comparable risk profile to normal CI/spam - not elevated security concerns
# - Workflow only validates text content - no code execution from PR
#
# ABUSE PREVENTION:
# - PR size limits prevent token exhaustion attacks
# - Rate limiting via GitHub's built-in mechanisms (60 requests/min)
# - Skip validation for extremely large changes
# - Graceful degradation if API unavailable
# - Monitor usage patterns for anomalies
#
# TOKEN BUDGET:
# - ~1,500 tokens per PR validation (with extraction optimization)
# - 2M monthly free tier = ~1,300 PR validations/month
# - Daily capacity: ~43 PRs (sufficient for active projects)
# - Rate limited to 60 requests/min by Gemini API

name: Contribution Validator

on:
  pull_request:
    types: [opened, synchronize, edited]
    # Skip pure documentation changes that don't affect contribution guidelines
    paths-ignore:
      - '**.md'
      - 'docs/**'

# SECURITY: Explicit minimal permissions
permissions:
  contents: read # Read repository content and guidelines
  pull-requests: write # Post validation comments
  statuses: write # Set status checks

jobs:
  validate-contributions:
    name: Validate Against Contribution Guidelines
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # ABUSE PREVENTION: Skip validation for suspicious PRs
    if: |
      github.event.pull_request.additions < 10000 &&
      github.event.pull_request.changed_files < 100 &&
      github.event.pull_request.commits < 50

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # SECURITY: Only checkout target branch, not PR code
          ref: ${{ github.base_ref }}

      # SIMPLIFIED: Read full guidelines files for initial testing
      # TODO: Optimize with extraction once core functionality works

      - name: Read Contributing Guidelines
        id: guidelines
        run: |
          GUIDELINES=$(cat CONTRIBUTING.md)
          echo "GUIDELINES<<EOF" >> $GITHUB_OUTPUT
          echo "$GUIDELINES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # CONTENT COLLECTION: Get PR details for validation

      - name: Get PR Information
        id: pr-info
        run: |
          # Get PR title and description
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          PR_COMMITS="${{ github.event.pull_request.commits }}"

          # Get commit messages from the PR
          COMMIT_MESSAGES=$(gh pr view ${{ github.event.number }} \
            --json commits --jq '.commits[].messageHeadline' | head -20)

          # Get files changed in the PR for context
          FILES_CHANGED=$(gh pr view ${{ github.event.number }} \
            --json files --jq '.files[].path' | head -10)

          # Get a summary of changes (first few lines of diff)
          CHANGES_SUMMARY=$(gh pr diff ${{ github.event.number }} | head -50)

          # Format for AI validation
          echo "PR_TITLE=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "PR_BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$PR_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "PR_COMMITS=$PR_COMMITS" >> $GITHUB_OUTPUT
          echo "COMMIT_MESSAGES<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MESSAGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "FILES_CHANGED<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES_CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "CHANGES_SUMMARY<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES_SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      # AI VALIDATION: Use Gemini CLI to validate against guidelines

      - name: Validate with Gemini CLI
        id: validation
        uses: google-github-actions/run-gemini-cli@v0.1.11
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          settings: |
            {
              "model": "gemini-1.5-flash"
            }
          prompt: |
            Validate this contribution to TDD Guard project and provide specific improvements.

            PROJECT CONTEXT: TDD Guard is a Claude Code hook that enforces Test-Driven Development.

            GUIDELINES:
            - Use conventional commits (type: description)
            - PR titles must be descriptive and use conventional format
            - Commit messages must explain WHY, not WHAT
            - PRs need clear descriptions explaining changes and purpose

            CURRENT CONTRIBUTION:
            PR Title: "${{ steps.pr-info.outputs.PR_TITLE }}"
            PR Description: "${{ steps.pr-info.outputs.PR_BODY }}"
            Commit Messages: ${{ steps.pr-info.outputs.COMMIT_MESSAGES }}
            Commit Count: ${{ steps.pr-info.outputs.PR_COMMITS }}
            Files Changed: ${{ steps.pr-info.outputs.FILES_CHANGED }}

            CHANGES MADE:
            ${{ steps.pr-info.outputs.CHANGES_SUMMARY }}

            Return ONLY this format:
            STATUS: PASS/FAIL/WARNINGS
            ISSUES: [list violations or "None"]
            SUGGESTIONS: [list improvements or "None"]
            IMPROVED_TITLE: [specific suggested PR title based on actual changes]
            IMPROVED_COMMITS: [rewritten commit messages explaining WHY]
            IMPROVED_DESCRIPTION: [enhanced PR description explaining what and why]

      # FORMAT RESULTS: Convert raw output to professional markdown

      - name: Format Validation Results
        id: format
        run: |
          # Store raw output in temp file to avoid shell quote issues
          cat << 'RAWEOF' > /tmp/raw_output.txt
          ${{ steps.validation.outputs.summary }}
          RAWEOF

          # Extract status
          STATUS=$(grep "STATUS:" /tmp/raw_output.txt | sed 's/STATUS: //' | tr -d ' ')

          # Add debugging - show what AI actually returned
          echo "=== DEBUG: Raw AI Output ===" >> $GITHUB_STEP_SUMMARY
          cat /tmp/raw_output.txt >> $GITHUB_STEP_SUMMARY
          echo "=== END DEBUG ===" >> $GITHUB_STEP_SUMMARY

          # Extract multiline content using awk for proper parsing
          ISSUES_RAW=$(awk '/^ISSUES:/{flag=1; next} /^SUGGESTIONS:|^IMPROVED_TITLE:|^IMPROVED_COMMITS:|^IMPROVED_DESCRIPTION:|^STATUS:/{flag=0} flag' /tmp/raw_output.txt)
          SUGGESTIONS_RAW=$(awk '/^SUGGESTIONS:/{flag=1; next} /^ISSUES:|^IMPROVED_TITLE:|^IMPROVED_COMMITS:|^IMPROVED_DESCRIPTION:|^STATUS:/{flag=0} flag' /tmp/raw_output.txt)

          # Enhanced debugging to see extracted content
          echo "=== EXTRACTED ISSUES ===" >> $GITHUB_STEP_SUMMARY
          echo "[$ISSUES_RAW]" >> $GITHUB_STEP_SUMMARY
          echo "=== EXTRACTED SUGGESTIONS ===" >> $GITHUB_STEP_SUMMARY
          echo "[$SUGGESTIONS_RAW]" >> $GITHUB_STEP_SUMMARY

          # Convert content to markdown lists with better handling
          ISSUES_FORMATTED=""
          if [[ -n "$ISSUES_RAW" && "$ISSUES_RAW" != "None" && "$ISSUES_RAW" != "ISSUES:" ]]; then
            # Try to parse as JSON array first
            if echo "$ISSUES_RAW" | jq -r '.[]' > /dev/null 2>&1; then
              ISSUES_FORMATTED=$(echo "$ISSUES_RAW" | jq -r '.[] | "- " + .')
            else
              # Handle both JSON array format and plain text
              if [[ "$ISSUES_RAW" == \[* ]]; then
                # JSON array format: ["item1", "item2"]
                ISSUES_FORMATTED=$(echo "$ISSUES_RAW" | sed 's/\["//' | sed 's/"\]//' | sed 's/", *"/\n- /g' | sed 's/^/- /')
              else
                # Plain text or other format - treat each line as an item
                ISSUES_FORMATTED=$(echo "$ISSUES_RAW" | sed 's/^/- /' | sed '/^- *$/d')
              fi
            fi
          fi

          SUGGESTIONS_FORMATTED=""
          if [[ -n "$SUGGESTIONS_RAW" && "$SUGGESTIONS_RAW" != "None" && "$SUGGESTIONS_RAW" != "SUGGESTIONS:" ]]; then
            # Try to parse as JSON array first
            if echo "$SUGGESTIONS_RAW" | jq -r '.[]' > /dev/null 2>&1; then
              SUGGESTIONS_FORMATTED=$(echo "$SUGGESTIONS_RAW" | jq -r '.[] | "- " + .')
            else
              # Handle both JSON array format and plain text
              if [[ "$SUGGESTIONS_RAW" == \[* ]]; then
                # JSON array format: ["item1", "item2"]
                SUGGESTIONS_FORMATTED=$(echo "$SUGGESTIONS_RAW" | sed 's/\["//' | sed 's/"\]//' | sed 's/", *"/\n- /g' | sed 's/^/- /')
              else
                # Plain text or other format - treat each line as an item
                SUGGESTIONS_FORMATTED=$(echo "$SUGGESTIONS_RAW" | sed 's/^/- /' | sed '/^- *$/d')
              fi
            fi
          fi

          # Extract improved content using multiline-aware approach
          IMPROVED_TITLE=$(awk '/^IMPROVED_TITLE:/{flag=1; next} /^IMPROVED_COMMITS:|^IMPROVED_DESCRIPTION:|^ISSUES:|^SUGGESTIONS:|^STATUS:/{flag=0} flag' /tmp/raw_output.txt | head -5 | tr '\n' ' ' | sed 's/^[ \t]*//;s/[ \t]*$//')
          IMPROVED_COMMITS=$(awk '/^IMPROVED_COMMITS:/{flag=1; next} /^IMPROVED_TITLE:|^IMPROVED_DESCRIPTION:|^ISSUES:|^SUGGESTIONS:|^STATUS:/{flag=0} flag' /tmp/raw_output.txt)
          IMPROVED_DESCRIPTION=$(awk '/^IMPROVED_DESCRIPTION:/{flag=1; next} /^IMPROVED_TITLE:|^IMPROVED_COMMITS:|^ISSUES:|^SUGGESTIONS:|^STATUS:/{flag=0} flag' /tmp/raw_output.txt)

          # Debug extracted improved content
          echo "=== EXTRACTED IMPROVED TITLE ===" >> $GITHUB_STEP_SUMMARY
          echo "[$IMPROVED_TITLE]" >> $GITHUB_STEP_SUMMARY
          echo "=== EXTRACTED IMPROVED COMMITS ===" >> $GITHUB_STEP_SUMMARY
          echo "[$IMPROVED_COMMITS]" >> $GITHUB_STEP_SUMMARY
          echo "=== EXTRACTED IMPROVED DESCRIPTION ===" >> $GITHUB_STEP_SUMMARY
          echo "[$IMPROVED_DESCRIPTION]" >> $GITHUB_STEP_SUMMARY

          # Determine status emoji and message
          if [[ "$STATUS" == "PASS" ]]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="Passed"
            STATUS_MESSAGE="Great work! Your contribution meets our guidelines."
          elif [[ "$STATUS" == "WARNINGS" ]]; then
            STATUS_EMOJI="⚠️"
            STATUS_TEXT="Passed with Warnings"
            STATUS_MESSAGE="Your contribution looks good, but consider these suggestions for improvement."
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="Needs Improvement"
            STATUS_MESSAGE="Your contribution needs some changes to meet our guidelines."
          fi

          # Build formatted markdown using echo statements to avoid YAML issues
          echo "## 🤖 Contribution Validation Results" > /tmp/formatted_output.md
          echo "" >> /tmp/formatted_output.md
          echo "### Status: $STATUS_EMOJI $STATUS_TEXT" >> /tmp/formatted_output.md
          echo "$STATUS_MESSAGE" >> /tmp/formatted_output.md

          # Add Issues section if available
          if [[ "$ISSUES_FORMATTED" != "" ]]; then
            echo "" >> /tmp/formatted_output.md
            echo "### 📋 Issues Found:" >> /tmp/formatted_output.md
            echo "$ISSUES_FORMATTED" >> /tmp/formatted_output.md
          fi

          # Add Suggestions section if available
          if [[ "$SUGGESTIONS_FORMATTED" != "" ]]; then
            echo "" >> /tmp/formatted_output.md
            echo "### 💡 Suggestions for Improvement:" >> /tmp/formatted_output.md
            echo "$SUGGESTIONS_FORMATTED" >> /tmp/formatted_output.md
          fi

          # Add Specific Improvements section if any improved content is available
          if [[ "$IMPROVED_TITLE" != "" || "$IMPROVED_COMMITS" != "" || "$IMPROVED_DESCRIPTION" != "" ]]; then
            echo "" >> /tmp/formatted_output.md
            echo "### ✨ Specific Improvements:" >> /tmp/formatted_output.md
          fi

          # Add Suggested PR Title if available
          if [[ "$IMPROVED_TITLE" != "" ]]; then
            echo "" >> /tmp/formatted_output.md
            echo "#### 📝 Suggested PR Title:" >> /tmp/formatted_output.md
            echo '```' >> /tmp/formatted_output.md
            echo "$IMPROVED_TITLE" >> /tmp/formatted_output.md
            echo '```' >> /tmp/formatted_output.md
          fi

          # Add Suggested Commit Message if available
          if [[ "$IMPROVED_COMMITS" != "" ]]; then
            echo "" >> /tmp/formatted_output.md
            echo "#### 📋 Suggested Commit Message:" >> /tmp/formatted_output.md
            echo '```' >> /tmp/formatted_output.md
            echo "$IMPROVED_COMMITS" >> /tmp/formatted_output.md
            echo '```' >> /tmp/formatted_output.md
          fi

          # Add Suggested PR Description if available
          if [[ "$IMPROVED_DESCRIPTION" != "" ]]; then
            echo "" >> /tmp/formatted_output.md
            echo "#### 📄 Suggested PR Description:" >> /tmp/formatted_output.md
            echo '```' >> /tmp/formatted_output.md
            echo "$IMPROVED_DESCRIPTION" >> /tmp/formatted_output.md
            echo '```' >> /tmp/formatted_output.md
          fi

          # Add footer
          echo "" >> /tmp/formatted_output.md
          echo "---" >> /tmp/formatted_output.md
          echo "*Automated validation based on our [contribution guidelines](CONTRIBUTING.md).*" >> /tmp/formatted_output.md
          echo "*If you believe this is incorrect, please mention a maintainer for review.*" >> /tmp/formatted_output.md

          # Output formatted result using proper multiline delimiter
          echo "FORMATTED_BODY<<GITHUBEOF" >> $GITHUB_OUTPUT
          cat /tmp/formatted_output.md >> $GITHUB_OUTPUT
          echo "GITHUBEOF" >> $GITHUB_OUTPUT

          # Also output simple status for status checks
          echo "STATUS=$STATUS" >> $GITHUB_OUTPUT

      # RESULTS POSTING: Comment validation results and set status

      - name: Post Validation Results
        uses: actions/github-script@v7
        env:
          FORMATTED_RESULT: ${{ steps.format.outputs.FORMATTED_BODY }}
          VALIDATION_STATUS: ${{ steps.format.outputs.STATUS }}
        with:
          script: |
            // Use environment variable to safely pass the formatted result
            const formattedResult = process.env.FORMATTED_RESULT;
            const status = process.env.VALIDATION_STATUS;
            const prNumber = context.payload.pull_request.number;

            // Determine if validation passed
            const isPassing = status === 'PASS';
            const hasWarnings = status === 'WARNINGS';

            // Post comment with formatted results
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: formattedResult
            });

            // Set status check
            const state = isPassing ? 'success' :
                          hasWarnings ? 'pending' : 'failure';
            const description = isPassing ? 'All guidelines met' :
                               hasWarnings ? 'Minor issues found' :
                               'Guidelines violations detected';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: state,
              target_url: `https://github.com/${context.repo.owner}/` +
                `${context.repo.repo}/actions/runs/${context.runId}`,
              description: description,
              context: 'Contribution Validator'
            });

      # ERROR HANDLING: Graceful degradation if API fails

      - name: Handle Validation Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## ⚠️ Validation Service Unavailable\n\n` +
                `The AI-powered contribution validator is ` +
                `temporarily unavailable. ` +
                `This could be due to:\n- API rate limits\n- Service outage\n` +
                `- Network issues\n\n**Manual Review Required**: ` +
                `Please ensure your contribution ` +
                `follows our ` +
                `[guidelines](CONTRIBUTING.md):\n` +
                `- Commit messages use conventional format\n` +
                `- PR title is descriptive\n` +
                `- Description explains what and why\n\n` +
                `A maintainer will review this PR manually.`
            });

            // Set neutral status - don't block the PR
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              target_url: `https://github.com/${context.repo.owner}/` +
                `${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Validation skipped - service unavailable',
              context: 'Contribution Validator'
            });

# MONITORING AND MAINTENANCE NOTES:
#
# 1. Monitor workflow usage in Actions tab for abuse patterns
# 2. Check token consumption via Gemini API dashboard
# 3. Adjust size limits if legitimate PRs are being skipped
# 4. Update guidelines extraction if contribution docs change
# 5. Review validation quality and adjust prompts as needed
#
# COST MANAGEMENT:
#
# Free tier limits:
# - 2M tokens/month
# - 60 requests/min
# - 1,000 requests/day
#
# Expected usage:
# - ~1,500 tokens per validation
# - Supports ~1,300 PRs/month
# - Monitor via Google AI Studio dashboard
